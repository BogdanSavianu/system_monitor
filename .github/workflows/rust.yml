name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev || \
            sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy check
        run: cargo clippy --all-targets --all-features
      - name: Run tests
        run: cargo test --all-features --verbose

  matrix:
    name: Matrix (${{ matrix.os }}, ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04, ubuntu-24.04]
        toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux GUI dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-3-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev || \
            sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --all-features --verbose
      - name: Run tests
        run: cargo test --all-features --verbose

  distro-containers:
    name: Distro (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-12
            image: debian:12
            setup_cmd: |
              apt-get update
              apt-get install -y --no-install-recommends \
                curl \
                ca-certificates \
                build-essential \
                pkg-config \
                libgtk-3-dev \
                libglib2.0-dev \
                libatk1.0-dev \
                libgdk-pixbuf-2.0-dev \
                libpango1.0-dev \
                libcairo2-dev \
                libayatana-appindicator3-dev
              apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev || \
                apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          - name: fedora-40
            image: fedora:40
            setup_cmd: |
              dnf -y install \
                curl \
                ca-certificates \
                gcc \
                gcc-c++ \
                make \
                pkgconf-pkg-config \
                gtk3-devel \
                glib2-devel \
                atk-devel \
                gdk-pixbuf2-devel \
                pango-devel \
                cairo-devel \
                webkit2gtk4.1-devel \
                libappindicator-gtk3-devel
              dnf clean all
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: ${{ matrix.setup_cmd }}
      - name: Install Rust toolchain
        shell: bash
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Build
        run: cargo build --all-features --verbose
      - name: Run tests
        run: cargo test --all-features --verbose
